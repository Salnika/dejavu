<svg xmlns="http://www.w3.org/2000/svg" width="820" height="386" viewBox="0 0 820 386" role="img" aria-label="Dejavu benchmark: tokens an agent reads per scenario, with and without Dejavu">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #e6edf3; }
