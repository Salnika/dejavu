-anchor="middle" class="cnt withc">6,444</text><rect x="671.0" y="140" width="30" height="190" rx="4" class="without"/><rect x="711.0" y="140" width="30" height="190" rx="4" class="with"/><text x="706.0" y="350" text-anchor="middle" class="lbl">machine-safety</text><rect x="500" y="60" width="12" height="12" rx="3" class="without"/><text x="518" y="71" class="sm">without Dejavu</text><rect x="640" y="60" width="12" height="12" rx="3" class="with"/><text x="658" y="71" class="sm">with Dejavu</text>
  <text x="30" y="374" class="sm">1,078,508 tokens saved across the suite (99.0% overall) · bars scaled per scenario, real token counts labeled</text>
