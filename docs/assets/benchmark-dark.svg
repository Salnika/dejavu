    .sm  { font-size: 11.5px; fill: #9198a1; }
    .cnt { font-size: 11px; font-variant-numeric: tabular-nums; }
    .mut { fill: #9198a1; }
    .mutb { fill: #9198a1; font-weight: 600; font-size: 12px; }
    .withc { fill: #3fb950; font-weight: 600; }
